<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Movie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .form-container {
            max-width: 500px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }
        .movie-title {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
        .form-label {
            font-weight: 500;
        }
        .btn-done {
            width: 100%;
            padding: 10px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container bg-white">
            <h2 class="movie-title">Edit Movie Rating</h2>
            
            <form action="{{ url_for('edit', id=movie.id) }}" method="POST">
                <div class="mb-3">
                    <label for="movieTitle" class="form-label">Movie Title</label>
                    <input type="text" class="form-control" id="movieTitle" value="{{ movie.title }}" readonly>
                </div>
                
                <div class="mb-3">
                    <label for="rating" class="form-label">Your Rating Out of 10 (e.g. 7.5)</label>
                    <input type="number" class="form-control" id="rating" name="new_rating" value="{{ movie.rating }}" step="0.1" min="0" max="10" required>
                </div>
                
                <div class="mb-4">
                    <label for="review" class="form-label">Your Review</label>
                    <textarea class="form-control" id="review" name="new_review" rows="3" required>{{ movie.review }}</textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-done">Done</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
